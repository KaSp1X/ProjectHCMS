services:

  postgres:
    image: postgres:18.3
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/

  mongo:
    image: mongo:8.2.7
    container_name: mongo
    ports:
      - "27017:27017"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.8
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  
  notification-service:
    build: ./Services/HCMS.NotificationService
    container_name: notification-service
    depends_on:
      - kafka

  appointment-service:
    build: ./Services/HCMS.AppointmentService
    container_name: appointment-service
    depends_on:
      - postgres
      - kafka

  identity-service:
    build: ./Services/HCMS.IdentityService
    container_name: identity-service
    depends_on:
      - postgres

  doctor-service:
    build: ./Services/HCMS.DoctorService
    container_name: doctor-service
    depends_on:
      - postgres
      - kafka

  patient-service:
    build: ./Services/HCMS.PatientService
    container_name: patient-service
    depends_on:
      - postgres

  medical-records-service:
    build: ./Services/HCMS.MedicalRecordsService
    container_name: medical-records-service
    depends_on:
      - mongo
      - kafka

  api-gateway:
    build: ./HCMS.ApiGateway
    container_name: api-gateway
    depends_on:
      - appointment-service
      - doctor-service
      - identity-service
      - medical-records-service
      - patient-service
    ports:
      - "5000:8080"

volumes:
  postgres_data: